server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      # 從 container label 拿 job（你 compose 要有 labels.job）
      - source_labels: ['__meta_docker_container_label_job']
        target_label: job

      # container 名稱（方便 Grafana 查）
      - source_labels: ['__meta_docker_container_name']
        target_label: container

    pipeline_stages:
      # 先解析 docker JSON（必要）
      - docker: {}

      # Node.js JSON logs
        # winston, morgan 已經做 jason 格式化處理
      - match:
          selector: '{job="nodejs"}'
          stages:
            - json:
                expressions:
                  level: level
                  message: message
                  requestId: requestId
                  method: method
                  path: path
                  statusCode: statusCode

      # 🟨 Loki / system → logfmt
      - match:
          selector: '{job="loki"}'
          stages:
            - logfmt:
                mapping:
                  level: level
                  ts: ts
                  msg: msg

      # fallback（其他 docker logs）
      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  level: level
                  message: message
                  requestId: requestId