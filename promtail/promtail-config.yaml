server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      - source_labels: ['__meta_docker_container_label_job']
        target_label: 'job'

    pipeline_stages:
    # 先解析 docker JSON（必要）
      - docker: {}
  
        # Node.js JSON logs
        # winston, morgan 已經做 jason 格式化處理
        - match:
          selector: '{job="nodejs"}'
          stages:
            - json:
                expressions:
                  level:
                  message:
                  requestId:
                  method:
                  path:
                  statusCode:
        # 🟨 Loki / system → logfmt
        - match:
          selector: '{job="loki"}'
          stages:
            - logfmt: {}
        
        # docker logs
        # fallback（其他 docker logs）
        match:
          selector: '{job="docker"}'
          stages: 
            - json:
              expressions:
                level:
                message:
                requestId: