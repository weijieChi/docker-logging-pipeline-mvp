server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages: # structured logs
      - docker: {}

      # JSON logs（你的 Node.js）
      # winston, morgan 已經做 jason 格式化處理
      - match:
        selector: '{job="nodejs"}'
        stages:
          -json:
            expression:
            level:
            message:
            requestId:
            method:
            path:
            statusCode:
      # 🟨 Loki / system → logfmt
      - match:
        selector: '{job="loki"}'
        stages:
          - logfmt: {}