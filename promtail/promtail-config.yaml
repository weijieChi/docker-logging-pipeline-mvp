server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      # 從 docker label 拿 job
      - source_labels: ['__meta_docker_container_label_job']
        target_label: job

      # container name（方便查詢）
      - source_labels: ['__meta_docker_container_name']
        target_label: container

    pipeline_stages:
      # 1️⃣ 解析 docker JSON
      - docker: {}

      # 2️⃣ Node.js logs（JSON）
      - match:
          selector: '{job="nodejs"}'
          stages:
            - json:
                expressions:
                  level: level
                  message: message
                  requestId: requestId
                  method: method
                  path: path
                  statusCode: statusCode
                  ip: ip

              - labels:
                  level:
                  method:
                  statusCode:
                  ip:

      # 3️⃣ Loki logs（logfmt）👉 這段我幫你修好
      - match:
          selector: '{job="loki"}'
          stages:
            - logfmt:
                mapping:
                  level: level
                  ts: ts
                  msg: msg

      # 4️⃣ fallback（其他）
      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  level: level
                  message: message
                  requestId: requestId